[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: benchmark needs SU2/CalculiX/OpenRocket runs (minutes); deselect with -m "not slow"
    sim: 6DOF simulation benchmarks
    cfd: aerodynamics / SU2 benchmarks
    structures: structural / CalculiX benchmarks
filterwarnings =
    ignore::DeprecationWarning
